<!DOCTYPE html>
<html>
<head>
  <title>Blood Bank</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #ffe6e6;
    }

    h1 {
      color: darkred;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 80%;
    }

    button {
      padding: 10px;
      background: red;
      color: white;
      border: none;
      margin: 5px;
    }

    li {
      background: white;
      margin: 5px;
      padding: 10px;
      list-style: none;
    }
  </style>
</head>

<body>

<h1>🩸 Blood Bank Management</h1>

<input id="name" placeholder="Name"><br>
<input id="blood" placeholder="Blood Group"><br>
<input id="location" placeholder="Location"><br>
<input id="contact" placeholder="Contact"><br>

<button onclick="addDonor()">Add Donor</button>

<h2>Donor List</h2>
<ul id="list"></ul>

<script>
let donors = JSON.parse(localStorage.getItem("donors")) || [];

function saveData() {
  localStorage.setItem("donors", JSON.stringify(donors));
}

function addDonor() {
  const donor = {
    name: document.getElementById("name").value,
    blood: document.getElementById("blood").value,
    location: document.getElementById("location").value,
    contact: document.getElementById("contact").value
  };

  donors.push(donor);
  saveData();
  displayDonors();
}

function displayDonors() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  donors.forEach((d, index) => {
    const li = document.createElement("li");
    li.innerHTML = `
      ${d.name} - ${d.blood} - ${d.location} 
      <br>📞 ${d.contact}
      <br><button onclick="deleteDonor(${index})">Delete</button>
    `;
    list.appendChild(li);
  });
}

function deleteDonor(index) {
  donors.splice(index, 1);
  saveData();
  displayDonors();
}

displayDonors();
</script>

</body>
</html>
